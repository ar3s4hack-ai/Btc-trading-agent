name: Agente autónomo (análisis + alertas)

on:
  workflow_dispatch: {}        # lanzable a mano desde la pestaña Actions
  schedule:
    # nominal cada 15 min en minutos descolocados (:04/:19/:34/:49): GitHub
    # recorta los crons en las horas punta de :00/:30, y con la frecuencia
    # anterior (*/30) el hueco real medio era de 128 min con picos de 285 —
    # suficiente para perder señales válidas (caso del 09/07, nota 65.3%)
    - cron: '4,19,34,49 * * * *'

permissions:
  contents: write

concurrency:
  group: trading-agent
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analizar mercado y generar señales
        env:
          # Opcionales: crea estos secrets en Settings -> Secrets and variables
          # -> Actions para recibir las alertas en Telegram. Sin ellos el agente
          # sigue funcionando y solo actualiza el dashboard.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node agent/run.js

      - name: Publicar signals.json y trades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals.json data/trades.json data/trades-b.json data/trades-c.json data/signals-log.json data/fundamental.json
          git diff --cached --quiet || git commit -m "chore: actualizar señales y paper trading [skip ci]"
          git push
