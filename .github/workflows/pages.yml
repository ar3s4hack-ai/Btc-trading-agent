name: Publicar dashboard (GitHub Pages)

on:
  workflow_dispatch: {}          # lanzable a mano; el primer run activa Pages
  push:
    branches: [main]
  schedule:
    - cron: '9,39 * * * *'       # justo después de cada pasada del agente (:00/:30)
  workflow_run:                  # y también al acabar análisis/reentrenamiento
    workflows:
      - "Agente autónomo (análisis + alertas)"
      - "Entrenar modelo ML (1 año Binance)"
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main              # siempre lo último de main, con data/ al día

      - name: Configurar (y activar si hace falta) GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Reintentar (Pages falla transitoriamente a veces)
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
